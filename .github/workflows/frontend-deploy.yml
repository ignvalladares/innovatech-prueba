name: Deploy Frontend

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "front_despacho/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front_despacho
          push: true
          tags: ignvalladares/isy1101-front-despacho:latest

      - name: Deploy in WEB
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_WEB_HOST }}
          username: ${{ secrets.EC2_WEB_USER }}
          key: ${{ secrets.EC2_WEB_SSH_KEY }}
          script: |
            docker pull ignvalladares/isy1101-front-despacho:latest
            docker stop innovatech_frontend || true
            docker rm innovatech_frontend || true
            docker run -d \
              --name innovatech_frontend \
              --restart unless-stopped \
              -p 80:8080 \
              -e VENTAS_API_HOST=10.0.0.137 \
              -e DESPACHOS_API_HOST=10.0.0.137 \
              ignvalladares/isy1101-front-despacho:latest
            docker ps
