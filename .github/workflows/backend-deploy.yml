name: Deploy Backend

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "back-Ventas_SpringBoot/**"
      - "back-Despachos_SpringBoot/**"
      - "docker-compose.app.yml"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api ventas
        uses: docker/build-push-action@v6
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: ignvalladares/isy1101-api-ventas:latest

      - name: Build and push api despachos
        uses: docker/build-push-action@v6
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: ignvalladares/isy1101-api-despachos:latest

      - name: Copy compose to APP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_APP_HOST }}
          username: ${{ secrets.EC2_APP_USER }}
          key: ${{ secrets.EC2_APP_SSH_KEY }}
          source: "docker-compose.app.yml"
          target: "/home/ec2-user/"

      - name: Deploy in APP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_APP_HOST }}
          username: ${{ secrets.EC2_APP_USER }}
          key: ${{ secrets.EC2_APP_SSH_KEY }}
          script: |
            cd /home/ec2-user
            cat > .env <<EOT
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOT
            docker pull ignvalladares/isy1101-api-ventas:latest
            docker pull ignvalladares/isy1101-api-despachos:latest
            docker compose -f docker-compose.app.yml up -d
            docker ps
