name: Deploy Backend

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "back-Ventas_SpringBoot/**"
      - "back-Despachos_SpringBoot/**"
      - "docker-compose.app.yml"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api ventas
        uses: docker/build-push-action@v6
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: ignvalladares/isy1101-api-ventas:latest

      - name: Build and push api despachos
        uses: docker/build-push-action@v6
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: ignvalladares/isy1101-api-despachos:latest

      - name: Send deploy command to APP via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_APP_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend containers" \
            --parameters 'commands=[
              "cd /home/ec2-user",
              "cat > .env <<EOT\nDB_PASSWORD=${{ secrets.DB_PASSWORD }}\nEOT",
              "cat > docker-compose.app.yml <<EOT\nservices:\n  api_ventas:\n    image: ignvalladares/isy1101-api-ventas:latest\n    container_name: api_ventas\n    restart: unless-stopped\n    environment:\n      DB_ENDPOINT: 10.0.0.149\n      DB_PORT: 3306\n      DB_NAME: ventas_db\n      DB_USERNAME: innovatech_user\n      DB_PASSWORD: ${DB_PASSWORD}\n      SPRING_DATASOURCE_URL: jdbc:mysql://10.0.0.149:3306/ventas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true\n    ports:\n      - \"8080:8080\"\n\n  api_despachos:\n    image: ignvalladares/isy1101-api-despachos:latest\n    container_name: api_despachos\n    restart: unless-stopped\n    environment:\n      DB_ENDPOINT: 10.0.0.149\n      DB_PORT: 3306\n      DB_NAME: despachos_db\n      DB_USERNAME: innovatech_user\n      DB_PASSWORD: ${DB_PASSWORD}\n      SPRING_DATASOURCE_URL: jdbc:mysql://10.0.0.149:3306/despachos_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true\n    ports:\n      - \"8081:8081\"\nEOT",
              "docker pull ignvalladares/isy1101-api-ventas:latest",
              "docker pull ignvalladares/isy1101-api-despachos:latest",
              "docker compose -f /home/ec2-user/docker-compose.app.yml up -d",
              "docker ps"
            ]' \
            --timeout-seconds 600
