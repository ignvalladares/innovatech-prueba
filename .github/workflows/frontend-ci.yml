name: Frontend CI
run-name: Frontend CI - ${{ github.ref_name }}

on:
  push:
    branches: [ "main", "deploy" ]
    paths:
      - "front_despacho/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [ "main", "deploy" ]
    paths:
      - "front_despacho/**"

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front_despacho/package-lock.json

      - name: Install dependencies
        working-directory: front_despacho
        run: npm install

      - name: Build frontend
        working-directory: front_despacho
        run: npm run build

      - name: Build Docker image frontend
        working-directory: front_despacho
        run: docker build -t isy1101-front-despacho:ci .
